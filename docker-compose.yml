# ============================================================
# FinControl — Docker Compose
# Ambiente virtual completo: PHP + MySQL + phpMyAdmin
# Uso: docker compose up -d
# ============================================================

services:
  # ─── Aplicação Laravel ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fincontrol-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_NAME=FinControl
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=fincontrol
      - DB_USERNAME=fincontrol
      - DB_PASSWORD=fincontrol123
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - REDIS_CLIENT=predis
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
      - LOG_CHANNEL=stack
    volumes:
      - ./resources:/var/www/html/resources
      - ./public:/var/www/html/public
      - ./app:/var/www/html/app
      - ./routes:/var/www/html/routes
      - ./database:/var/www/html/database
      - app-storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fincontrol-net

  # ─── Banco de Dados MySQL ────────────────────────
  db:
    image: mysql:8.4
    container_name: fincontrol-db
    restart: unless-stopped
    command: --innodb-buffer-pool-size=128M
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: fincontrol
      MYSQL_USER: fincontrol
      MYSQL_PASSWORD: fincontrol123
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass123"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fincontrol-net

  # ─── phpMyAdmin (Gerenciador visual do banco) ────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: fincontrol-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpass123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fincontrol-net

  # ─── Redis (Cache em memória ultra-rápido) ───────
  redis:
    image: redis:7-alpine
    container_name: fincontrol-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - fincontrol-net

# ─── Volumes persistentes ──────────────────────────
volumes:
  db-data:
    driver: local
  app-storage:
    driver: local

# ─── Rede interna ──────────────────────────────────
networks:
  fincontrol-net:
    driver: bridge
 